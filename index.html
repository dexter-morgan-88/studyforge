<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyForge AI — Regional & Vision Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@700&family=Instrument+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#05050a; --a:#5b6ef5; --white:#ffffff; --gray:rgba(255,255,255,0.1); }
        body { background: var(--bg); color: var(--white); font-family: 'Instrument+Sans', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 20px; text-align: center; border-bottom: 1px solid var(--gray); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .input-area { padding: 20px; background: #0e0e18; border-top: 1px solid var(--gray); display: flex; flex-direction: column; gap: 10px; }
        .controls { display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; background: var(--gray); border: none; padding: 12px; border-radius: 8px; color: white; }
        button { background: var(--a); border: none; padding: 10px 18px; border-radius: 8px; color: white; cursor: pointer; font-weight: 600; }
        .pricing-banner { background: #16162a; padding: 10px; text-align: center; font-size: 0.9em; }
        .preview-img { max-width: 100px; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div class="header">StudyForge AI <span id="region-tag" style="font-size: 10px; opacity: 0.5;"></span></div>
<div id="chat-window"></div>

<div class="pricing-banner">
    Current Plan: <span id="local-price">Detecting prices...</span> 
    <button onclick="payUPI()" style="padding: 4px 8px; font-size: 11px;">Upgrade via UPI</button>
</div>

<div class="input-area">
    <img id="image-preview" class="preview-img">
    <div class="controls">
        <input type="file" id="file-input" accept="image/*" hidden onchange="handleImage(event)">
        <button onclick="document.getElementById('file-input').click()">📎</button>
        <button onclick="startCamera()">📸</button>
        <input type="text" id="user-input" placeholder="Ask anything or upload notes...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    let base64Image = null;
    let currentCurrency = '₹';
    let currentPrice = '199';

    // 1. Detect Location & Currency
    async function setupRegion() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            const rates = { 'IN': ['₹', '199'], 'DK': ['kr.', '150'], 'US': ['$', '19'] };
            const region = rates[data.country_code] || ['$', '24'];
            currentCurrency = region[0];
            currentPrice = region[1];
            document.getElementById('local-price').innerText = `Pro for ${currentCurrency}${currentPrice}/mo`;
            document.getElementById('region-tag').innerText = `REGION: ${data.country_name}`;
        } catch (e) { document.getElementById('local-price').innerText = "Pro for ₹199/mo"; }
    }
    setupRegion();

    // 2. Handle Images
    function handleImage(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = () => {
            base64Image = reader.result.split(',')[1];
            const img = document.getElementById('image-preview');
            img.src = reader.result;
            img.style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    // 3. Simple UPI Payment (Works for FamPay/GPay)
    function payUPI() {
        const upiId = "YOUR_FAMPAY_ID@fam"; // <--- CHANGE THIS
        const link = `upi://pay?pa=${upiId}&pn=StudyForge&am=${currentPrice}&cu=INR`;
        window.location.href = link;
    }

    // 4. Send Message to Server
    async function sendMessage() {
        const text = document.getElementById('user-input').value;
        if (!text && !base64Image) return;

        const win = document.getElementById('chat-window');
        win.innerHTML += `<div><b>You:</b> ${text}</div>`;
        
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: text, image: base64Image })
        });
        
        const data = await response.json();
        win.innerHTML += `<div><b>AI:</b> ${data.reply}</div>`;
        
        // Reset
        base64Image = null;
        document.getElementById('image-preview').style.display = 'none';
        document.getElementById('user-input').value = '';
    }
</script>
</body>
</html>
